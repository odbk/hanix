# ── Prefix ───────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0

# ── Splits ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navegación estilo vim (con prefix) ───────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Navegación Alt+flechas (sin prefix) ──────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Reload ───────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "  Config recargado"

# ── Colores ──────────────────────────────────────────────
bg="#1e1e2e"
fg="#cdd6f4"
green="#00ff41"
green_dim="#1a6b1a"
gray="#585b70"

# ── Panes ────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#00ff41"

# ── Status bar ───────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left "#[fg=#00ff41,bold] #S #[fg=#1a6b1a]⟫ "
set -g status-left-length 30

set -g status-right "#[fg=#1a6b1a]⟪ #[fg=#585b70]%H:%M #[fg=#1a6b1a]│#[fg=#585b70] %d/%m/%Y "
set -g status-right-length 40

setw -g window-status-format         "#[fg=#585b70] #I:#W "
setw -g window-status-current-format "#[fg=#00ff41,bold] #I:#W "
setw -g window-status-separator      ""

# ── Mensajes ─────────────────────────────────────────────
set -g message-style "bg=#1e1e2e,fg=#00ff41"
