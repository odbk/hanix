; ════════════════════════════════════════════════════════
; polybar — tema hacker / matrix  [HiDPI 1.75x]
; Generado automáticamente — edita config.ini y regenera
; ════════════════════════════════════════════════════════

[settings]
screenchange-reload = true

[colors]
bg        = #1e1e2e
fg        = #cdd6f4
green     = #00ff41
green-dim = #1a6b1a
gray      = #585b70
gray-dark = #313244
red       = #f38ba8
yellow    = #f9e2af

; ── Barra superior — monitor principal ───────────────────
[bar/primary]
monitor              = ${env:MONITOR:}
width                = 100%
height               = 46
fixed-center         = true
background           = ${colors.bg}
foreground           = ${colors.fg}
border-bottom-size   = 2
border-bottom-color  = ${colors.green-dim}
line-size            = 4
padding-left         = 1
padding-right        = 2
module-margin-left   = 0
module-margin-right  = 0
font-0               = JetBrainsMono Nerd Font:size=18:weight=regular;4
font-1               = JetBrainsMono Nerd Font:size=12:weight=regular;4
modules-left         = i3
modules-center       = hanix
modules-right        = nixupdates bluetooth sep net sep sound sep cpu sep memory sep disk sep date sep powermenu
cursor-click         = pointer
dpi                  = 0
enable-ipc           = true

; ── Barra superior — monitor secundario ──────────────────
[bar/secondary]
monitor              = ${env:MONITOR:}
width                = 100%
height               = 46
fixed-center         = true
background           = ${colors.bg}
foreground           = ${colors.fg}
border-bottom-size   = 2
border-bottom-color  = ${colors.green-dim}
line-size            = 4
padding-left         = 1
padding-right        = 2
module-margin-left   = 0
module-margin-right  = 0
font-0               = JetBrainsMono Nerd Font:size=18:weight=regular;4
font-1               = JetBrainsMono Nerd Font:size=12:weight=regular;4
modules-left         = i3
modules-center       = hanix
modules-right        = nixupdates bluetooth sep net sep sound sep cpu sep memory sep disk sep date sep powermenu
cursor-click         = pointer
dpi                  = 0
enable-ipc           = true

; ── Barra inferior — monitor principal (con tray) ────────
[bar/bottom-primary]
monitor              = ${env:MONITOR:}
bottom               = true
width                = 100%
height               = 42
fixed-center         = true
background           = ${colors.bg}
foreground           = ${colors.fg}
border-top-size      = 2
border-top-color     = ${colors.green-dim}
line-size            = 4
padding-left         = 2
padding-right        = 2
module-margin-left   = 0
module-margin-right  = 0
font-0               = JetBrainsMono Nerd Font:size=18:weight=regular;4
font-1               = JetBrainsMono Nerd Font:size=12:weight=regular;4
font-2               = DejaVu Serif:style=Bold Italic:size=23;7
modules-left         = ip-local sep ip-vpn
modules-center       = cheatsheet
modules-right        = tray
cursor-click         = pointer
dpi                  = 0
enable-ipc           = true

; ── Barra inferior — monitor secundario ──────────────────
[bar/bottom-secondary]
monitor              = ${env:MONITOR:}
bottom               = true
width                = 100%
height               = 42
fixed-center         = true
background           = ${colors.bg}
foreground           = ${colors.fg}
border-top-size      = 2
border-top-color     = ${colors.green-dim}
line-size            = 4
padding-left         = 2
padding-right        = 2
module-margin-left   = 0
module-margin-right  = 0
font-0               = JetBrainsMono Nerd Font:size=18:weight=regular;4
font-1               = JetBrainsMono Nerd Font:size=12:weight=regular;4
font-2               = DejaVu Serif:style=Bold Italic:size=23;7
modules-left         = ip-local sep ip-vpn
modules-center       = cheatsheet
modules-right        =
cursor-click         = pointer
dpi                  = 0
enable-ipc           = true

; ── Bandeja del sistema (solo en bar/primary) ────────────
[module/tray]
type       = internal/tray
tray-size  = 28
tray-padding = 7

; ── Separador ────────────────────────────────────────────
[module/sep]
type   = custom/text
format = ⟫
format-foreground = ${colors.green-dim}
format-padding    = 1

; ── HaNiX (centro) ───────────────────────────────────────
[module/hanix]
type   = custom/text
format = HaNiX
format-foreground = ${colors.green}

; ── Workspaces i3 ────────────────────────────────────────
[module/i3]
type             = internal/i3
format           = <label-state>
index-sort       = true
wrapping-scroll  = false
pin-workspaces   = false
enable-scroll    = false

label-focused            = %index%
label-focused-foreground = ${colors.green}
label-focused-underline  = ${colors.green}
label-focused-padding    = 2

label-unfocused            = %index%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding    = 2

label-visible            = %index%
label-visible-foreground = ${colors.gray}
label-visible-padding    = 2

label-urgent             = %index%
label-urgent-foreground  = ${colors.red}
label-urgent-padding     = 2

; ── NixOS updates ────────────────────────────────────────
[module/nixupdates]
type         = custom/script
exec         = ~/.config/polybar/scripts/nixupdates.sh
interval     = 3600
click-left   = alacritty -e bash -c 'cd ~/hanix && nix flake update; echo ""; echo "Pulsa Enter para cerrar."; read' &

; ── Bluetooth ────────────────────────────────────────────
[module/bluetooth]
type            = custom/script
exec            = ~/.config/polybar/bluetooth.sh
interval        = 5
click-left      = blueman-manager &
label-foreground = ${colors.green}

; ── WiFi ─────────────────────────────────────────────────
[module/net]
type                          = internal/network
interface-type                = wireless
interval                      = 5
label-connected               = 󰤨 %essid%
label-connected-foreground    = ${colors.green}
label-disconnected            = 󰤭
label-disconnected-foreground = ${colors.gray}

; ── Volumen ───────────────────────────────────────────────
[module/sound]
type                   = internal/pulseaudio
label-volume           = 󰕾 %percentage%%
label-muted            = 󰸈 mute
label-muted-foreground = ${colors.gray}

; ── CPU ──────────────────────────────────────────────────
[module/cpu]
type                  = internal/cpu
interval              = 2
label                 = 󰻠 %percentage%%
label-warn            = 󰻠 %percentage%%
label-warn-foreground = ${colors.yellow}
warn-percentage       = 60

; ── RAM ──────────────────────────────────────────────────
[module/memory]
type                  = internal/memory
interval              = 3
label                 = 󰑭 %percentage_used%%
label-warn            = 󰑭 %percentage_used%%
label-warn-foreground = ${colors.yellow}
warn-percentage       = 70

; ── Disco ────────────────────────────────────────────────
[module/disk]
type        = custom/script
exec        = df -k / /home 2>/dev/null | awk 'NR>1 && !seen[$1]++{t+=$4} END{if(t>=1048576) printf "󰋊 %.0fG\n",t/1048576; else printf "󰋊 %.0fM\n",t/1024}'
interval    = 60
click-left  = bash ~/.config/polybar/scripts/diskinfo.sh &

; ── Power menu ───────────────────────────────────────────
[module/powermenu]
type        = custom/text
format      = 󰐥
format-foreground = ${colors.red}
format-padding    = 1
click-left  = bash ~/.config/polybar/scripts/powermenu.sh &

; ── Reloj ────────────────────────────────────────────────
[module/date]
type     = internal/date
interval = 30
date     = %d/%m/%Y
time     = %H:%M
label    = 󰥔 %time%  %date%

; ── IP local ─────────────────────────────────────────────
[module/ip-local]
type        = custom/script
exec        = ~/.config/polybar/scripts/ip-local.sh
interval    = 10
label-foreground = ${colors.fg}
click-left  = bash -c 'ip=$(~/.config/polybar/scripts/ip-local.sh | grep -oE "[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+"); echo -n "$ip" | xclip -selection clipboard && dunstify -t 2500 -u normal "󰆒  Copiado" "$ip"' &

; ── Cheatsheet ───────────────────────────────────────────
[module/cheatsheet]
type        = custom/text
format      = %{T3}i%{T-}
format-foreground = ${colors.green}
format-padding    = 2
click-left  = bash ~/.config/polybar/scripts/cheatsheet.sh &

; ── IP VPN ───────────────────────────────────────────────
[module/ip-vpn]
type        = custom/script
exec        = ~/.config/polybar/scripts/ip-vpn.sh
interval    = 5
label-foreground = ${colors.green}
click-left  = bash -c 'ip=$(~/.config/polybar/scripts/ip-vpn.sh | grep -oE "[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+"); echo -n "$ip" | xclip -selection clipboard && dunstify -t 1500 -u low "󰕥  Copiado" "$ip"' &
