# ── Picom — compositor para i3/X11 ──────────────────────
# Transparencia en ventanas sin foco (excepto browsers y polybar)

# Backend
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# Vsync
vsync = true;

# ── Opacidad de ventanas ─────────────────────────────────

# Ventana activa: 100%
active-opacity = 1.0;

# Ventana sin foco: 80% — excluye browsers, polybar, i3bar, rofi
inactive-opacity = 0.82;
inactive-opacity-override = false;

# Reglas de opacidad (tienen prioridad sobre inactive-opacity)
opacity-rule = [
  # Browsers — siempre opacos
  "100:class_g = 'firefox'",
  "100:class_g = 'Firefox'",
  "100:class_g = 'firefox-esr'",
  "100:class_g = 'Chromium-browser'",
  "100:class_g = 'Chromium'",
  "100:class_g = 'Google-chrome'",
  "100:class_g = 'Brave-browser'",
  "100:class_g = 'Opera'",
  "100:class_g = 'Vivaldi-stable'",
  # Reproductor de vídeo
  "100:class_g = 'mpv'",
  "100:class_g = 'vlc'",
  # Polybar y otras barras
  "100:class_g = 'Polybar'",
  # Rofi
  "100:class_g = 'Rofi'",
  # Notificaciones dunst
  "100:class_g = 'dunst'",
  # Pantalla de bloqueo
  "100:class_g = 'i3lock'"
];

# ── Sombras ───────────────────────────────────────────────
shadow = true;
shadow-radius = 10;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;
shadow-color = "#000000";

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'i3bar'",
  "class_g = 'dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ── Fade (transición suave al abrir/cerrar) ───────────────
fading = true;
fade-in-step  = 0.06;
fade-out-step = 0.06;
fade-delta    = 8;

fade-exclude = [];

# ── Blur (opcional — comenta si va lento) ────────────────
# blur-method = "dual_kawase";
# blur-strength = 5;
# blur-background = true;
# blur-background-exclude = [
#   "class_g = 'firefox'",
#   "class_g = 'Chromium'"
# ];

# ── Misc ──────────────────────────────────────────────────
mark-wmwin-focused   = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
use-ewmh-active-win    = true;
detect-transient       = true;
detect-client-leader   = true;
